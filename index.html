<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>联考词汇·记忆卡片</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        /* 规则面板 */
        .rule-box {
            background: #e6f0fa;
            border-left: 6px solid #2563eb;
            padding: 0.9rem 1.5rem;
            border-radius: 1rem;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
            color: #1e293b;
        }
        .rule-box strong {
            color: #1e4bd2;
        }
        /* 卡片&控制区 */
        .card-panel {
            background: white;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 20px 30px -10px rgba(0,20,40,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .flip-card {
            width: 100%;
            max-width: 550px;
            height: 220px;
            perspective: 1500px;
            cursor: pointer;
            margin: 0 auto;
        }
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
            border-radius: 28px;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.2);
        }
        .flipped .flip-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
            padding: 1.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #ffffff;
            border: 2px solid #dbeafe;
            box-shadow: inset 0 2px 6px #f0f7ff;
        }
        .card-front {
            background: linear-gradient(145deg, #ffffff, #f8fcff);
            color: #0a1e3c;
            font-size: 2.8rem;
            font-weight: 700;
            word-break: break-word;
        }
        .card-back {
            background: #eef2ff;
            color: #1e293b;
            transform: rotateY(180deg);
            font-size: 1.6rem;
            font-weight: 500;
            line-height: 1.4;
        }
        .card-back small {
            display: block;
            font-size: 1.2rem;
            color: #475569;
            margin-top: 0.5rem;
            font-weight: 400;
        }
        .timer-bar {
            font-size: 1.6rem;
            font-weight: 600;
            background: #2563eb10;
            padding: 0.3rem 1.8rem;
            border-radius: 60px;
            color: #2563eb;
            border: 1px solid #b3d0ff;
            letter-spacing: 1px;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .btn {
            border: none;
            background: white;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            min-width: 120px;
        }
        .btn.primary {
            background: #2563eb;
            color: white;
            border: none;
            box-shadow: 0 8px 18px #2563eb70;
        }
        .btn.primary:hover {
            background: #1d4ed8;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .btn.warning {
            background: #f97316;
            color: white;
            border: none;
        }
        .green-btn { background: #22c55e; color: white; border: none; }
        .red-btn { background: #ef4444; color: white; border: none; }
        .stack {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .status-msg {
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d3a5e;
            min-height: 2.5rem;
        }
        /* 词汇表格 */
        .vocab-table-wrapper {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 8px 22px rgba(0,0,0,0.06);
            max-height: 450px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            min-width: 600px;
        }
        th {
            background: #f8fafc;
            color: #334155;
            font-weight: 600;
            padding: 0.9rem 0.4rem;
            position: sticky;
            top: 0;
            background: #f1f5f9;
            z-index: 5;
        }
        td, th {
            padding: 0.7rem 0.4rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }
        tr.recognized {
            background-color: #dcfce7;
            border-left: 6px solid #22c55e;
        }
        tr.forgotten {
            background-color: #fee2e2;
            border-left: 6px solid #ef4444;
        }
        .forgotten-badge {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 0.2rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .meta-info {
            color: #475569;
            font-size: 0.95rem;
        }
        .greeting-congrats {
            background: #fef9c3;
            border-radius: 3rem;
            padding: 1rem 2.5rem;
            font-size: 2rem;
            font-weight: 700;
            color: #854d0e;
            text-align: center;
        }
        .pause-placeholder {
            background: #e9eef3;
            border-radius: 28px;
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #475569;
            font-weight: 400;
            border: 3px dashed #a0c0e0;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            color: #4b556b;
        }
        .small-note {
            background: #f1f4f9;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 规则区（一直可见） -->
    <div class="rule-box">
        <strong>📘 规则：</strong> 点击“开始”按钮后，你将看到一个单词，请在<strong>5秒内</strong>思考词义，点击词卡翻面查看词义，并选择“认识”或“遗忘”。
    </div>

    <!-- 卡片操作面板 -->
    <div class="card-panel">
        <!-- 动态卡片区域 -->
        <div id="cardArea" style="width: 100%;">
            <!-- 由JS填充：要么是 flip-card，要么是暂停占位/祝贺 -->
        </div>

        <!-- 计时器 & 按钮组 -->
        <div class="timer-bar" id="timerDisplay">—</div>
        <div class="action-buttons" id="actionButtons">
            <!-- 认识/遗忘/暂停/开始等由js控制渲染 -->
        </div>
        <div class="status-msg" id="statusMessage"></div>
    </div>

    <!-- 词汇列表 + 额外控制 -->
    <div class="footer-info">
        <span class="small-note">✅ 认识标记绿色，❌ 遗忘标记红色 (数字为遗忘次数)</span>
        <button class="btn" id="resetBtn" style="background:#e2e8f0;">🔄 重置全部</button>
    </div>
    <div class="vocab-table-wrapper" id="tableWrapper">
        <table id="wordTable">
            <thead>
                <tr><th>序号</th><th>词汇</th><th>词性</th><th>词义</th><th>状态</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- 动态渲染 -->
            </tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        // ----- 从词汇表构建数据 (保留原始顺序) -----
        const rawData = [
            { word: "elective", pos: "n./adj.", meaning: "选修课；选修的" },
            { word: "occasionally", pos: "adv.", meaning: "偶尔，有时候" },
            { word: "mechanic", pos: "n.", meaning: "机械师，技工" },
            { word: "license", pos: "n.", meaning: "执照，许可证" },
            { word: "roof", pos: "n.", meaning: "屋顶" },
            { word: "occasion", pos: "n.", meaning: "场合，时刻" },
            { word: "necessarily", pos: "adv.", meaning: "必然地，必定" },
            { word: "first-class", pos: "adj.", meaning: "一流的，头等的" },
            { word: "transfer", pos: "v./n.", meaning: "转移，转学；转让" },
            { word: "under one's belt", pos: "phr.", meaning: "获得，掌握（经验等）" },
            { word: "start from scratch", pos: "phr.", meaning: "从头开始，白手起家" },
            { word: "stadium", pos: "n.", meaning: "体育场" },
            { word: "tunnel", pos: "n.", meaning: "隧道，通道" },
            { word: "hands-on", pos: "adj.", meaning: "亲身实践的，动手的" },
            { word: "ornament", pos: "n.", meaning: "装饰品" },
            { word: "professor", pos: "n.", meaning: "教授" },
            { word: "sorrow", pos: "n.", meaning: "悲伤，悲痛" },
            { word: "regret", pos: "n./v.", meaning: "遗憾，后悔" },
            { word: "blank", pos: "adj./n.", meaning: "空白的；空白处" },
            { word: "be fond of", pos: "phr.", meaning: "喜欢" },
            { word: "suggestive", pos: "adj.", meaning: "暗示的，引起联想的" },
            { word: "experimental", pos: "adj.", meaning: "实验性的，试验的" }
        ];

        // 构建words对象，添加状态字段
        let words = rawData.map((item, idx) => ({
            id: idx,
            word: item.word,
            pos: item.pos,
            meaning: item.meaning,
            recognized: false,          // 认识后永久绿
            forgottenCount: 0
        }));

        // ----- 核心状态 -----
        let notSeen = [];                // 未在第一轮出现的索引 (初始所有)
        let forgotten = [];              // 遗忘的索引 (未认识但至少遗忘一次)
        let currentWordIndex = null;      // 当前展示的单词索引
        let learningActive = false;       // 是否处于学习模式 (开始后 true)
        let paused = false;               // 暂停状态
        let flipped = false;              // 当前卡片是否翻面
        let timerInterval = null;
        let remainingSeconds = 5;
        let allMastered = false;          // 全部认识

        // 初始化notSeen (所有索引)
        function resetState() {
            // 清除计时
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            // 重置words
            words.forEach(w => {
                w.recognized = false;
                w.forgottenCount = 0;
            });
            notSeen = words.map((_, idx) => idx);
            forgotten = [];
            currentWordIndex = null;
            learningActive = false;
            paused = false;
            flipped = false;
            allMastered = false;
            remainingSeconds = 5;
            renderList();
            renderCardArea();
            renderButtons();
            updateTimerDisplay();
        }

        // 打乱数组 (Fisher–Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 从适当池中获取下一个单词索引 (不改变池，只返回索引，移动池在外部)
        function pickNextIndex() {
            if (allMastered) return null;
            // 优先从未seen (第一轮未出现) 抽取
            if (notSeen.length > 0) {
                const randomIndex = Math.floor(Math.random() * notSeen.length);
                return notSeen[randomIndex];
            } else if (forgotten.length > 0) {
                // 从遗忘池随机抽 (可重复)
                const randomIndex = Math.floor(Math.random() * forgotten.length);
                return forgotten[randomIndex];
            }
            return null; // 全部认识
        }

        // 加载下一个单词 (更新currentWordIndex, 重置翻面, 重置计时)
        function loadNextWord() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;

            // 判断是否全部掌握
            if (notSeen.length === 0 && forgotten.length === 0) {
                allMastered = true;
                learningActive = false;
                paused = false;
                currentWordIndex = null;
                renderCardArea();
                renderButtons();
                renderList();
                return;
            }

            const nextIdx = pickNextIndex();
            if (nextIdx === null) {
                allMastered = true;
                learningActive = false;
                currentWordIndex = null;
                renderCardArea();
                renderButtons();
                return;
            }

            // 如果从notSeen中抽取，需要将它从notSeen移除 (表示已首次出现)
            if (notSeen.includes(nextIdx)) {
                notSeen = notSeen.filter(idx => idx !== nextIdx);
            }
            // 如果从forgotten抽取，不用移除 (保留在池中直到认识)

            currentWordIndex = nextIdx;
            flipped = false;
            remainingSeconds = 5;
            updateTimerDisplay();

            // 如果学习激活且未暂停，启动计时器
            if (learningActive && !paused) {
                startTimer();
            }

            renderCardArea();
            renderButtons();
            renderList(); // 列表高亮变化
        }

        // 计时开始
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (!learningActive || paused || allMastered || currentWordIndex === null) return;
            timerInterval = setInterval(() => {
                remainingSeconds -= 1;
                updateTimerDisplay();
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    // 超时 -> 自动遗忘
                    if (learningActive && !paused && currentWordIndex !== null && !allMastered) {
                        handleForgotten();
                    } else {
                        // 如果已经暂停或结束，不处理
                    }
                }
            }, 1000);
        }

        // 停止计时 (暂停或切换)
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // 处理“认识”
        function handleRecognize() {
            if (!learningActive || paused || currentWordIndex === null || allMastered) return;

            const idx = currentWordIndex;
            words[idx].recognized = true;               // 标记认识
            // 从遗忘池移除 (如果有)
            forgotten = forgotten.filter(i => i !== idx);
            // 不用操作notSeen，因为已经从notSeen移除了

            // 加载下一个单词
            loadNextWord();
        }

        // 处理“遗忘” (含超时调用)
        function handleForgotten() {
            if (!learningActive || paused || currentWordIndex === null || allMastered) return;

            const idx = currentWordIndex;
            words[idx].forgottenCount += 1;
            // 如果不在遗忘池中，加入 (确保不重复)
            if (!forgotten.includes(idx) && !words[idx].recognized) {
                forgotten.push(idx);
            }

            // 加载下一个
            loadNextWord();
        }

        // 翻面切换
        function toggleFlip() {
            if (!learningActive || paused || currentWordIndex === null || allMastered) return;
            flipped = !flipped;
            renderCardArea(); // 重新渲染卡片
        }

        // ----- 渲染视图 -----
        function renderList() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            let html = '';
            words.forEach((w, idx) => {
                const rowClass = w.recognized ? 'recognized' : (w.forgottenCount > 0 ? 'forgotten' : '');
                const statusText = w.recognized ? '✅ 认识' : (w.forgottenCount > 0 ? `❌ 遗忘 ${w.forgottenCount}次` : '⚪ 未学');
                html += `<tr class="${rowClass}">
                    <td>${idx+1}</td>
                    <td><strong>${w.word}</strong></td>
                    <td>${w.pos}</td>
                    <td>${w.meaning}</td>
                    <td>${statusText}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderCardArea() {
            const container = document.getElementById('cardArea');
            if (!container) return;
            let innerHtml = '';

            if (allMastered) {
                innerHtml = `<div class="greeting-congrats">🎉 恭喜！今天的词汇全部掌握了！</div>`;
            } else if (!learningActive) {
                // 未开始：显示占位提示
                innerHtml = `<div class="pause-placeholder">👆 点击「开始学习」</div>`;
            } else if (paused) {
                // 暂停状态
                innerHtml = `<div class="pause-placeholder">⏸️ 学习已暂停</div>`;
            } else if (currentWordIndex !== null) {
                const w = words[currentWordIndex];
                const frontContent = w.word;
                const backContent = `${w.pos} · ${w.meaning}`;
                const flipClass = flipped ? 'flipped' : '';
                innerHtml = `<div class="flip-card ${flipClass}" id="flipCard">
                    <div class="flip-inner">
                        <div class="card-front">${frontContent}</div>
                        <div class="card-back">${backContent}</div>
                    </div>
                </div>`;
            } else {
                innerHtml = `<div class="pause-placeholder">准备中...</div>`;
            }
            container.innerHTML = innerHtml;

            // 添加卡片点击事件 (如果存在)
            if (!allMastered && learningActive && !paused && currentWordIndex !== null) {
                const flipEl = document.getElementById('flipCard');
                if (flipEl) {
                    flipEl.addEventListener('click', toggleFlip);
                }
            }
        }

        function renderButtons() {
            const btnContainer = document.getElementById('actionButtons');
            const statusMsg = document.getElementById('statusMessage');
            if (!btnContainer) return;

            // 状态信息更新
            if (allMastered) {
                statusMsg.innerText = '所有单词已掌握 🎯';
            } else if (!learningActive) {
                statusMsg.innerText = '未开始学习';
            } else if (paused) {
                statusMsg.innerText = '已暂停，点击继续';
            } else {
                statusMsg.innerText = `当前进度：剩余未首轮 ${notSeen.length}  · 遗忘池 ${forgotten.length}`;
            }

            let buttonsHtml = '';

            if (allMastered) {
                buttonsHtml = `<button class="btn" disabled>🎉 完成</button>`;
            } else {
                if (!learningActive) {
                    // 未开始: 显示开始
                    buttonsHtml = `<button class="btn primary" id="startBtn">▶️ 开始学习</button>`;
                } else {
                    // 学习中 显示暂停/继续 以及认识/遗忘
                    if (paused) {
                        buttonsHtml = `<button class="btn primary" id="resumeBtn">▶️ 继续</button>`;
                    } else {
                        buttonsHtml = `<button class="btn" id="pauseBtn">⏸️ 暂停</button>`;
                    }
                    // 认识/遗忘按钮 (只有非暂停且非allMastered且current存在)
                    if (!paused && currentWordIndex !== null && !allMastered) {
                        buttonsHtml += `<button class="btn green-btn" id="knowBtn">✅ 认识</button>`;
                        buttonsHtml += `<button class="btn red-btn" id="forgetBtn">❌ 遗忘</button>`;
                    } else {
                        // 禁用状态 (但保留占位, 或者不加)
                    }
                }
            }

            // 重置按钮单独放在外面，但这里也可以加一个重置快捷？外面已有重置按钮，避免重复。
            btnContainer.innerHTML = buttonsHtml;

            // 绑定事件
            if (!allMastered) {
                document.getElementById('startBtn')?.addEventListener('click', () => {
                    learningActive = true;
                    paused = false;
                    if (currentWordIndex === null) {
                        loadNextWord();  // 初始化第一个词
                    } else {
                        // 如果有当前词（例如重置后），继续
                        if (!paused) startTimer();
                    }
                    renderCardArea();
                    renderButtons();
                });

                document.getElementById('pauseBtn')?.addEventListener('click', () => {
                    paused = true;
                    stopTimer();
                    renderCardArea();
                    renderButtons();
                });

                document.getElementById('resumeBtn')?.addEventListener('click', () => {
                    paused = false;
                    if (currentWordIndex !== null) {
                        startTimer();
                    } else {
                        loadNextWord();
                    }
                    renderCardArea();
                    renderButtons();
                });

                document.getElementById('knowBtn')?.addEventListener('click', handleRecognize);
                document.getElementById('forgetBtn')?.addEventListener('click', handleForgotten);
            }
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timerDisplay');
            if (!timerEl) return;
            if (!learningActive || paused || allMastered || currentWordIndex === null) {
                timerEl.textContent = '⏱️ —';
            } else {
                timerEl.textContent = `⏱️ ${remainingSeconds}秒`;
            }
        }

        // 重置 (绑定外部重置按钮)
        document.getElementById('resetBtn').addEventListener('click', () => {
            resetState();
        });

        // 初始化渲染
        resetState();

        // 额外监听 由于按钮重新渲染，用事件代理或者每次重新绑。但重置按钮是外部固定。
        // 使用事件代理处理动态按钮不容易，直接在renderButtons里绑定。
        // 但renderButtons会被多次调用，我们需要确保移除旧监听？我们采用每次替换innerHTML后重新获取元素绑定，避免重复叠加。
        // 已在renderButtons内绑定。
        // 同时卡片点击事件在renderCardArea绑定。

        // 页面加载完成后再渲染一次确保
        window.addEventListener('load', () => {
            renderList();
            renderCardArea();
            renderButtons();
        });
    })();
</script>
</body>
</html>
