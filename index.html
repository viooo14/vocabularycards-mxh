            display: flex;

        }
        
        .header {

        }

        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 0.9em;
            font-weight: 500;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #2b5876;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        button.active {
            background: #ffd700;
            color: #333;
        }
        
        .card-container {
            perspective: 1000px;
            width: 90%;
            max-width: 500px;
            height: 300px;
            margin-bottom: 30px;
        }
        
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            background: white;
        }
        
        .card-front {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            transition: background 0.3s;
        }
        
        .card-back {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            transform: rotateY(180deg);
            color: white;
        }
        
        .word {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            word-break: break-word;
        }
        
        .phonetic {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
            min-height: 1.8em; /* 留空时占位 */
        }
        
        .meaning {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            word-break: break-word;
        }
        
        .pos {
            font-size: 1.1em;
            opacity: 0.9;
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 15px;
        }
        
        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.9em;
            color: #999;
        }
        
        .navigation {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            padding: 0;
        }
        
        .progress-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.3s;
        }
        
        .list-view {
            display: none;
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .list-view.active {
            display: block;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .list-item:hover {
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .list-word {
            font-weight: bold;
            color: #4e4376;
            font-size: 1.2em;
        }
        
        .list-meaning {
            color: #666;
            max-width: 50%;
            text-align: right;
        }
        
        .hide-btn {
            margin-top: 20px;
            background: #ff6b6b;
            color: white;
        }

            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            margin-left: 8px;
        }
        
        @media print {
            body {
                background: white;
            }
            .controls, .navigation, .header {
                display: none;
            }
            .card-container {
                page-break-after: always;
                height: 250px;
                margin: 20px auto;
            }
            .card {
                transform: none !important;
            }
            .card-back {
                display: none;
            }
        }

</head>

                } else if (e.key === 'ArrowRight') {
                    nextCard();
                } else if (e.key === 'm' || e.key === 'M') {
                    markMastered();
                }
            });

            // 触摸滑动
            const container = document.getElementById('cardContainer');
            let touchStartX = 0;
            container.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            container.addEventListener('touchend', e => {
                const touchEndX = e.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 50) nextCard();
                if (touchEndX > touchStartX + 50) prevCard();
            });
        }

        function updateCard() {
            const card = vocabulary[currentIndex];
            document.getElementById('cardWord').textContent = card.word;
            document.getElementById('cardPhonetic').textContent = card.phonetic || ''; // 没有音标就留空
            document.getElementById('cardMeaning').textContent = card.meaning;
            document.getElementById('cardPos').textContent = card.pos;
            document.getElementById('current').textContent = currentIndex + 1;

            // 重置翻转
            isFlipped = false;
            document.getElementById('card').classList.remove('flipped');

            // 根据是否掌握改变卡片正面背景
            const front = document.getElementById('cardFront');
            if (masteredWords.has(card.word)) {
                front.style.background = 'linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%)';
            } else {
                front.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)';
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                updateCard();
                updateProgress();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
                updateProgress();
            }
        }

        function markMastered() {
            const word = vocabulary[currentIndex].word;
            if (masteredWords.has(word)) {
                masteredWords.delete(word);
            } else {
                masteredWords.add(word);
            }
            // 保存到localStorage
            localStorage.setItem('masteredWords', JSON.stringify([...masteredWords]));
            document.getElementById('mastered').textContent = masteredWords.size;
            updateCard(); // 更新背景
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / vocabulary.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function shuffleCards() {
            // Fisher-Yates 洗牌
            for (let i = vocabulary.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocabulary[i], vocabulary[j]] = [vocabulary[j], vocabulary[i]];
            }
            currentIndex = 0;
            // 注意：masteredWords 不变，因为基于word
            updateCard();
            updateProgress();
            generateList(); // 重新生成列表（顺序改变）
        }

        function toggleList() {
            const listView = document.getElementById('listView');
            const cardContainer = document.getElementById('cardContainer');
            const navigation = document.getElementById('navigation');

            if (listView.classList.contains('active')) {
                listView.classList.remove('active');
                cardContainer.style.display = 'block';
                navigation.style.display = 'flex';
            } else {
                listView.classList.add('active');
                cardContainer.style.display = 'none';
                navigation.style.display = 'none';
            }
        }

        function generateList() {
            const content = document.getElementById('listContent');
            content.innerHTML = '';
            vocabulary.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                const isMastered = masteredWords.has(item.word);
                div.innerHTML = `
                    <div>
                        <div class="list-word">${item.word} ${isMastered ? '<span class="mastered-badge">✓已掌握</span>' : ''}</div>
                        <div style="color:#999;font-size:0.9em;">${item.pos}</div>
                    </div>
                    <div class="list-meaning">${item.meaning}</div>
                `;
                div.onclick = () => {
                    currentIndex = index;
                    toggleList();
                    updateCard();
                    updateProgress();
                };
                content.appendChild(div);
            });
        }

        function resetProgress() {
            if (confirm('重置将清空所有“已掌握”标记，确定吗？')) {
                masteredWords.clear();
                localStorage.removeItem('masteredWords');
                document.getElementById('mastered').textContent = 0;
                updateCard(); // 刷新背景
                generateList(); // 更新列表标记
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
